{{define "layout_head"}}
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} — Whatsar</title>
  <link rel="stylesheet" href="/static/pico.min.css">
  <script src="/static/htmx.min.js" defer></script>
  <style>
    :root { --pico-font-size: 15px; }
    nav ul { margin-bottom: 0; }
    .badge { padding: .15rem .5rem; border-radius: 4px; font-size: .75rem; background: var(--pico-muted-border-color); }
    .badge.ok { background: #d1fae5; color: #065f46; }
    .badge.warn { background: #fef3c7; color: #92400e; }
    .badge.err { background: #fee2e2; color: #991b1b; }
    .qr-img { max-width: 280px; background: #fff; padding: 1rem; border-radius: 8px; }
    .mono { font-family: monospace; font-size: .85rem; }
    main { margin-top: 1.5rem; }
    .actions { display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; }
    table { font-size: .9rem; }
    table td { vertical-align: middle; }
    article header { margin-bottom: .25rem; font-size: .8rem; color: var(--pico-muted-color); }
    article h2 { font-size: 1.8rem; }
    h3 { margin-bottom: .75rem; }

    .sessions-panel { margin-bottom: 2rem; }
    .sessions-panel__head {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: .75rem;
    }
    .sessions-panel__head h3 { margin: 0; }
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 8px;
      background: var(--pico-card-background-color);
    }
    .sessions-table { margin: 0; width: 100%; border-collapse: collapse; }
    .sessions-table thead th {
      font-size: .72rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .04em; color: var(--pico-muted-color);
      padding: .65rem .85rem; border-bottom: 1px solid var(--pico-muted-border-color);
      white-space: nowrap; background: var(--pico-card-sectioning-background-color);
    }
    .sessions-table tbody td {
      padding: .75rem .85rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      vertical-align: top;
    }
    .sessions-table tbody tr:last-child td { border-bottom: none; }
    .sessions-table tbody tr:hover { background: var(--pico-card-sectioning-background-color); }
    .cell-session strong { display: block; font-size: .95rem; }
    .session-id {
      display: inline-block; margin-top: .2rem;
      font-size: .72rem; color: var(--pico-muted-color);
    }
    .cell-status { min-width: 8rem; white-space: nowrap; }
    .status-line {
      display: inline-flex; align-items: center; gap: .35rem; flex-wrap: nowrap;
    }
    .status-line .badge { margin: 0; white-space: nowrap; flex-shrink: 0; }
    .status-dot {
      width: .55rem; height: .55rem; border-radius: 50%; flex-shrink: 0;
      background: #9ca3af;
    }
    .status-dot.online { background: #22c55e; box-shadow: 0 0 0 2px #d1fae5; }
    .cell-phone { white-space: nowrap; }
    .cell-phone .empty { color: var(--pico-muted-color); font-style: italic; font-size: .85rem; }
    .cell-activity .counts { display: block; font-size: .82rem; white-space: nowrap; }
    .cell-activity .last-msg {
      display: block; margin-top: .25rem;
      font-size: .78rem; color: var(--pico-muted-color);
      max-width: 14rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .cell-actions { width: 1%; white-space: nowrap; }
    .btn-group {
      display: inline-flex; gap: .35rem; flex-wrap: nowrap; align-items: center;
    }
    .btn-sm {
      margin: 0; padding: .28rem .55rem !important;
      font-size: .75rem !important; line-height: 1.2;
    }
    .btn-sm.danger { --pico-color: #991b1b; }
    .slot-bar {
      margin-bottom: 1.25rem; padding: .65rem 1rem;
      border-radius: 8px; font-size: .85rem;
      background: var(--pico-card-sectioning-background-color);
      border: 1px solid var(--pico-muted-border-color);
    }
    @media (max-width: 768px) {
      .sessions-table .col-hide-sm { display: none; }
      .cell-activity .last-msg { max-width: 8rem; }
    }

    .docs-nav {
      display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.5rem;
      padding: .75rem; border-radius: 8px;
      background: var(--pico-card-sectioning-background-color);
      border: 1px solid var(--pico-muted-border-color);
    }
    .docs-nav a { font-size: .85rem; margin: 0; }
    .docs-section { margin-bottom: 2.5rem; }
    .docs-section h2 { font-size: 1.35rem; margin-bottom: .5rem; }
    .docs-section h3 { font-size: 1.05rem; margin-top: 1.25rem; }
    .endpoint {
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 8px; margin: 1rem 0; overflow: hidden;
    }
    .endpoint-head {
      display: flex; align-items: center; gap: .6rem; flex-wrap: wrap;
      padding: .6rem .85rem; font-size: .85rem;
      background: var(--pico-card-sectioning-background-color);
      border-bottom: 1px solid var(--pico-muted-border-color);
    }
    .method {
      font-family: monospace; font-weight: 700; font-size: .75rem;
      padding: .15rem .45rem; border-radius: 4px; color: #fff;
    }
    .method.get { background: #2563eb; }
    .method.post { background: #16a34a; }
    .method.delete { background: #dc2626; }
    .endpoint-path { font-family: monospace; font-size: .82rem; }
    .endpoint-body { padding: .85rem; font-size: .9rem; }
    .endpoint-body pre {
      margin: .5rem 0 0; padding: .75rem 1rem;
      border-radius: 6px; font-size: .78rem; line-height: 1.45;
      background: #1e293b; color: #e2e8f0; overflow-x: auto;
    }
    .endpoint-body code {
      font-family: monospace; font-size: .82rem;
      background: var(--pico-card-sectioning-background-color);
      padding: .1rem .35rem; border-radius: 3px;
    }
    .steps { counter-reset: step; list-style: none; padding: 0; }
    .steps li {
      counter-increment: step; position: relative;
      padding: .5rem 0 .5rem 2.2rem; border-left: 2px solid var(--pico-muted-border-color);
      margin-left: .75rem;
    }
    .steps li::before {
      content: counter(step); position: absolute; left: -.85rem; top: .45rem;
      width: 1.5rem; height: 1.5rem; border-radius: 50%;
      background: var(--pico-primary); color: var(--pico-primary-inverse);
      font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .steps li:last-child { border-left-color: transparent; }
    .docs-table { font-size: .85rem; }
    .docs-table th { font-size: .72rem; text-transform: uppercase; letter-spacing: .03em; }
    .tip {
      padding: .75rem 1rem; border-radius: 8px; font-size: .88rem;
      background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af;
    }

    .settings-stack { display: flex; flex-direction: column; gap: 1.25rem; }
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      align-items: stretch;
    }
    .settings-grid .settings-card {
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .settings-grid .settings-card__body {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .settings-card {
      margin: 0; padding: 0;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: 10px; overflow: hidden;
      background: var(--pico-card-background-color);
    }
    .settings-card__head {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      background: var(--pico-card-sectioning-background-color);
    }
    .settings-card__head h2 {
      margin: 0 0 .25rem; font-size: 1.1rem; line-height: 1.3;
    }
    .settings-card__head p {
      margin: 0; font-size: .85rem; color: var(--pico-muted-color);
    }
    .settings-card__body { padding: 1.25rem; }
    .settings-card__body > *:first-child { margin-top: 0; }
    .settings-card__body > *:last-child { margin-bottom: 0; }
    .alert {
      padding: .75rem 1rem; border-radius: 8px; font-size: .88rem;
      border: 1px solid transparent; margin-bottom: 1rem;
    }
    .alert:last-child { margin-bottom: 0; }
    .alert.ok { background: #f0fdf4; border-color: #86efac; color: #065f46; }
    .alert.err { background: #fef2f2; border-color: #fecaca; color: #991b1b; }
    .key-current {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      padding: .75rem 1rem; margin-bottom: 1.25rem;
      border-radius: 8px; font-size: .88rem;
      background: var(--pico-card-sectioning-background-color);
      border: 1px solid var(--pico-muted-border-color);
    }
    .key-current__label {
      font-size: .72rem; text-transform: uppercase; letter-spacing: .04em;
      color: var(--pico-muted-color); margin-bottom: .2rem;
    }
    .key-current__value { font-size: .95rem; word-break: break-all; }
    .key-reveal {
      padding: 1rem 1.15rem; border-radius: 8px; margin-bottom: 1.25rem;
      background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
    }
    .key-reveal__label { font-size: .75rem; color: #94a3b8; margin: 0 0 .5rem; }
    .key-reveal__value {
      margin: 0; padding: .65rem .75rem; border-radius: 6px;
      background: #1e293b; font-size: .85rem; word-break: break-all;
    }
    .settings-pane {
      padding: 1rem; border-radius: 8px;
      border: 1px solid var(--pico-muted-border-color);
      background: var(--pico-card-sectioning-background-color);
    }
    .settings-pane + .settings-pane { margin-top: .75rem; }
    .settings-pane h3 {
      margin: 0 0 .35rem; font-size: .92rem; font-weight: 600;
    }
    .settings-pane > p {
      margin: 0 0 .85rem; font-size: .8rem; color: var(--pico-muted-color);
    }
    .settings-pane form { margin: 0; }
    .settings-pane label { margin-bottom: .65rem; }
    .settings-pane button { margin: 0; width: 100%; }
    .settings-pane small {
      display: block; margin-top: .5rem; font-size: .75rem;
      color: var(--pico-muted-color);
    }
    .settings-form label { margin-bottom: .75rem; }
    .settings-form button { margin-top: .15rem; width: 100%; }
    .settings-footer {
      display: flex; flex-wrap: wrap; gap: .75rem 1.25rem;
      font-size: .88rem; margin-top: .5rem;
    }
    @media (max-width: 900px) {
      .settings-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="container">
    <ul>
      <li><strong>Whatsar</strong></li>
    </ul>
    <ul>
      <li><a href="/admin">Dashboard</a></li>
      <li><a href="/admin/sessions/new">+ Session</a></li>
      <li><a href="/admin/messages">Pesan</a></li>
      <li><a href="/admin/docs">Dokumentasi</a></li>
      <li><a href="/admin/settings">Pengaturan</a></li>
      <li><a href="/admin/logout">Logout</a></li>
    </ul>
  </nav>
  <main class="container">
{{end}}

{{define "layout_foot"}}
  </main>
</body>
</html>
{{end}}
