{{define "dashboard"}}
{{template "layout_head" .}}
{{template "dashboard_page" .}}
{{template "layout_foot" .}}
{{end}}

{{define "dashboard_page"}}
<header>
  <h1>Dashboard</h1>
  <p>Monitor session WhatsApp, status koneksi, dan aktivitas pesan.</p>
</header>

<div class="actions" style="margin-bottom: 1.5rem;">
  <a href="/admin/sessions/new" role="button">+ Buat Session Baru</a>
  <a href="/admin/messages" role="button" class="outline">Log Pesan</a>
</div>

<div id="dashboard-content"
     hx-get="/admin/partials/dashboard"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
  <p aria-busy="true">Memuat dashboard...</p>
</div>
{{end}}
